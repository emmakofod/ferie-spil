<!DOCTYPE html>
<html lang="da">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Nummerplade A→Z</title>
  <link rel="stylesheet" href="shared.css">
</head>

<body>
  <div class="top-nav"><a href="index.html" class="back-btn">← </a></div>
  <h1>🔤 Nummerplade A→Z</h1>
  <p class="sub">Find bogstaverne i rækkefølge på nummerplader!</p>

  <div class="current-letter">
    <div class="lbl">Find dette bogstav:</div>
    <div class="big" id="current-letter">A</div>
    <div class="hint" id="hint"></div>
  </div>

  <button class="found-btn" id="found-btn" onclick="letterFound()">✅ Fundet!</button>

  <div class="progress-wrap">
    <div class="progress-label" id="progress-label">0 af 26 bogstaver fundet</div>
    <div class="letters-grid" id="letters-grid"></div>
  </div>

  <div class="celebration" id="celebration">
    🎉 A til Z! Du er champion! 🎉<br>
    <span style="font-size:1rem;font-weight:700">Alle 26 bogstaver fundet!</span>
  </div>

  <button class="reset-btn" onclick="reset()">🔄 Start forfra</button>

  <script>
    const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    const HINTS = {
      A: 'Starter som i Appelsin 🍊', B: 'Starter som i Bil 🚗', C: 'Starter som i Cykel 🚲',
      D: 'Starter som i Delfin 🐬', E: 'Starter som i Elefant 🐘', F: 'Starter som i Fisk 🐟',
      G: 'Starter som i Giraffe 🦒', H: 'Starter som i Hest 🐴', I: 'Starter som i Is 🍦',
      J: 'Starter som i Jordbær 🍓', K: 'Starter som i Kat 🐱', L: 'Starter som i Løve 🦁',
      M: 'Starter som i Måge 🦅', N: 'Starter som i Næsehorn 🦏', O: 'Starter som i Orangutang 🦧',
      P: 'Starter som i Pingvin 🐧', Q: 'Næsten ligesom O med hale!', R: 'Starter som i Regnbue 🌈',
      S: 'Starter som i Snegl 🐌', T: 'Starter som i Tiger 🐯', U: 'Starter som i Ugle 🦉',
      V: 'Starter som i Vandmand 🪼', W: 'To V\'er sammen!', X: 'Et kryds!',
      Y: 'Starter som i Yoyo 🪀', Z: 'Det SIDSTE bogstav! 🏆'
    };

    let current = 0;

    function render() {
      const COLORS = [
        '#FFB3BA', '#FFBFA8', '#FFCBA4', '#FFD9A0', '#FFF3A3', '#E8F5A3',
        '#C5EAA0', '#B5EAD7', '#A8EAD8', '#A8D8EA', '#A8C8F0', '#B0B8F4',
        '#C4B5F4', '#D4B5F4', '#F4B5E8', '#F4B5D4', '#F4B5C0', '#FFB3BA',
        '#FFCBA4', '#FFF3A3', '#B5EAD7', '#A8D8EA', '#C4B5F4', '#F4B5D4',
        '#FFD9A0', '#E8F5A3'
      ];
      const grid = document.getElementById('letters-grid');
      grid.innerHTML = '';
      LETTERS.forEach((l, i) => {
        const chip = document.createElement('div');
        chip.className = 'letter-chip' + (i < current ? ' done' : i === current ? ' active' : '');
        chip.textContent = l;
        grid.appendChild(chip);
      });
      if (current < LETTERS.length) {
        document.querySelector('.current-letter').style.background = COLORS[current];
        document.getElementById('current-letter').textContent = LETTERS[current]; // ← mangler!
        document.getElementById('hint').textContent = HINTS[LETTERS[current]];
        document.getElementById('found-btn').style.display = 'block';
        document.getElementById('progress-label').textContent = `${current} af 26 bogstaver fundet`;
      } else {
        document.getElementById('current-letter').textContent = '🏆';
        document.getElementById('hint').textContent = 'Du fandt dem alle!';
        document.getElementById('found-btn').style.display = 'none';
        document.getElementById('progress-label').textContent = '26 af 26 bogstaver fundet!';
        document.getElementById('celebration').classList.add('show');
      }
      save();
    }

    function letterFound() {
      if (current < LETTERS.length) {
        current++;
        render();
      }
    }

    function reset() {
      current = 0;
      document.getElementById('celebration').classList.remove('show');
      render();
    }

    function save() { try { localStorage.setItem('nummerplade_current', current); } catch (e) { } }
    function load() { try { current = parseInt(localStorage.getItem('nummerplade_current')) || 0; } catch (e) { current = 0; } }

    load(); render();
  </script>
</body>

</html>
