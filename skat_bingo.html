<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Skat-samler 💎</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<a href="index.html" class="back-btn">← </a>
<h1>💎 Skat-samler!</h1>
<p class="sub">Find og saml de her skatte på Bornholm!</p>

<div class="score-bar" id="score-bar">💎 0 af 14 fundet</div>

<div class="treasure-grid" id="treasure-grid"></div>

<div class="celebration" id="celebration">
  🏆 Du er en ÆGTE skat-samler! 🏆<br>
  <span style="font-size:1rem;font-weight:700">Alle skatte fundet! Imponerende!</span>
</div>

<button class="reset-btn" onclick="reset()">🔄 Start forfra</button>

<script>
const TREASURES = [
  { emoji: '🪨', label: 'Pæn, rund sten', hint: 'Glat og rund fra havet' },
  { emoji: '🐚', label: 'Muslingeskal', hint: 'Hel og fin' },
  { emoji: '🪵', label: 'Drivtømmer', hint: 'Et stykke træ fra havet' },
  { emoji: '🌿', label: 'Tang', hint: 'Grøn eller brun' },
  { emoji: '🪶', label: 'Fuglefjer', hint: 'En enkelt smuk fjer' },
  { emoji: '📄', label: 'Brochure', hint: 'Fra et sted I har besøgt' },
  { emoji: '🍂', label: 'Stort blad', hint: 'Interessant form eller farve' },
  { emoji: '🌸', label: 'Vild blomst', hint: 'En blomst fra naturen' },
  { emoji: '🪸', label: 'Koraller eller koral-sten', hint: 'Mærkelig formet sten' },
  { emoji: '🦀', label: 'Krabbeskjold', hint: 'Tomt skjold fra en krabbe' },
  { emoji: '⚓', label: 'Noget med anker på', hint: 'Souvenir, klistermærke osv.' },
  { emoji: '🍦', label: 'Is-pind eller is-indpakning', hint: 'Fra den bedste is!' },
  { emoji: '🌰', label: 'Kogle', hint: 'Fra en fyr- eller gran' },
  { emoji: '💌', label: 'Postkort', hint: 'Køb og send til nogen du holder af' },
];

let found = {};

function load() { try { found = JSON.parse(localStorage.getItem('skat_found') || '{}'); } catch(e) { found = {}; } }
function save() { try { localStorage.setItem('skat_found', JSON.stringify(found)); } catch(e) {} }

function render() {
  const grid = document.getElementById('treasure-grid');
  grid.innerHTML = '';
  let count = 0;
  TREASURES.forEach((t, i) => {
    if (found[i]) count++;
    const card = document.createElement('div');
    card.className = 'treasure-card' + (found[i] ? ' found' : '');
    card.innerHTML = `
      <span class="treasure-emoji">${t.emoji}</span>
      <span class="found-stamp">✅</span>
      <div class="treasure-label">${t.label}</div>
      <div class="treasure-hint">${t.hint}</div>
    `;
    card.onclick = () => { found[i] = !found[i]; save(); render(); };
    grid.appendChild(card);
  });
  document.getElementById('score-bar').textContent = `💎 ${count} af ${TREASURES.length} fundet`;
  const cel = document.getElementById('celebration');
  if (count === TREASURES.length) cel.classList.add('show');
  else cel.classList.remove('show');
}

function reset() { found = {}; try { localStorage.removeItem('skat_found'); } catch(e) {} render(); }

load(); render();
</script>
</body>
</html>
