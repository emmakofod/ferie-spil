<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Gæt dyret! 🐘</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<a href="index.html" class="back-btn">←</a>
<h1>🐘 Gæt dyret!</h1>
<p class="sub">De andre stiller ja/nej spørgsmål — du holder telefonen!</p>

<div class="animal-card">
  <span class="animal-emoji" id="emoji"></span>
  <div class="animal-name" id="name"></div>
</div>

<div class="action-row">
  <button class="action-btn skip" onclick="skip()">⏭ Spring over</button>
  <button class="action-btn next" onclick="guessed()">🎉 Gættet!</button>
</div>

<div class="score-display" id="score">⭐ 0 point</div>

<script>
const ANIMALS = [
  { emoji: '🐘', name: 'Elefant'},
  { emoji: '🦁', name: 'Løve'},
  { emoji: '🐬', name: 'Delfin'},
  { emoji: '🦒', name: 'Giraf'},
  { emoji: '🐧', name: 'Pingvin'},
  { emoji: '🦊', name: 'Ræv'},
  { emoji: '🐙', name: 'Blæksprutte'},
  { emoji: '🦋', name: 'Sommerfugl'},
  { emoji: '🐊', name: 'Krokodille'},
  { emoji: '🦓', name: 'Zebra'},
  { emoji: '🐼', name: 'Panda'},
  { emoji: '🦅', name: 'Ørn'},
  { emoji: '🐢', name: 'Skildpadde'},
  { emoji: '🦘', name: 'Kænguru'},
  { emoji: '🦩', name: 'Flamingo'},
  { emoji: '🐺', name: 'Ulv'},
  { emoji: '🦜', name: 'Papegøje'},
  { emoji: '🐨', name: 'Koala'},
  { emoji: '🦈', name: 'Haj'},
  { emoji: '🐸', name: 'Frø'},
];

let shuffled = [];
let idx = 0;
let score = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function render() {
  const a = shuffled[idx % shuffled.length];
  document.getElementById('emoji').textContent = a.emoji;
  document.getElementById('name').textContent = a.name;
  document.getElementById('score').textContent = `⭐ ${score} point`;
}


function guessed() { score++; idx++; render(); }
function skip() { idx++; render(); }

shuffled = shuffle(ANIMALS);
render();
</script>
</body>
</html>
