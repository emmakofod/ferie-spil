<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Farve-jagt 🎨</title>
<link rel="stylesheet" href="shared.css">
<style>
.target-card {
  border: 4px solid var(--dark);
  border-radius: 24px;
  box-shadow: 5px 5px 0 var(--dark);
  text-align: center;
  padding: 28px 20px;
  margin: 0 auto 20px;
  max-width: 360px;
  transition: background 0.4s;
}
.target-card .lbl { font-family: 'Fredoka One', cursive; font-size: 1rem; margin-bottom: 10px; opacity: 0.8; }
.target-card .color-name { font-family: 'Fredoka One', cursive; font-size: 3rem; line-height: 1; }
.target-card .emoji { font-size: 2.5rem; margin-top: 8px; }
.target-card .example { font-size: 0.9rem; font-weight: 700; margin-top: 8px; opacity: 0.75; }

.found-btn {
  display: block; width: 100%; max-width: 360px; margin: 0 auto 16px;
  padding: 18px; border-radius: 18px; border: 4px solid var(--deep);
  background: var(--green); color: white;
  font-family: 'Fredoka One', cursive; font-size: 1.4rem;
  cursor: pointer; box-shadow: 4px 4px 0 var(--deep); touch-action: manipulation;
}
.found-btn:active { transform: scale(0.95); }

.color-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  max-width: 420px; margin: 0 auto 20px;
}
.color-chip {
  border-radius: 14px; border: 3px solid rgba(0,0,0,0.2);
  aspect-ratio: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  font-family: 'Fredoka One', cursive; font-size: 0.75rem; color: white;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
  transition: all 0.2s; position: relative; overflow: hidden;
}
.color-chip.done::after {
  content: '✅'; position: absolute; font-size: 1.8rem;
  text-shadow: none; background: rgba(0,0,0,0.3); inset: 0;
  display: flex; align-items: center; justify-content: center;
}
.color-chip.active { border: 4px solid var(--dark); box-shadow: 0 0 0 3px var(--sun), 4px 4px 0 var(--dark); transform: scale(1.08); }
.color-chip .chip-emoji { font-size: 1.4rem; text-shadow: none; }

.score-bar {
  text-align: center; font-family: 'Fredoka One', cursive; font-size: 1.2rem;
  color: var(--sea); margin-bottom: 12px;
}

.reset-btn {
  display: block; margin: 8px auto 0; padding: 12px 24px;
  border-radius: 14px; border: 3px solid var(--coral);
  background: white; color: var(--coral);
  font-family: 'Fredoka One', cursive; font-size: 1rem; cursor: pointer;
  touch-action: manipulation;
}
.reset-btn:active { background: var(--coral); color: white; }
</style>
</head>
<body>
<a href="index.html" class="back-btn">← Hjem</a>
<h1>🎨 Farve-jagt!</h1>
<p class="sub">Find de her farver ude af vinduet!</p>

<div class="target-card" id="target-card">
  <div class="lbl">Find denne farve:</div>
  <div class="color-name" id="color-name"></div>
  <div class="emoji" id="color-emoji"></div>
  <div class="example" id="color-example"></div>
</div>

<button class="found-btn" id="found-btn" onclick="colorFound()">✅ Fundet!</button>

<div class="score-bar" id="score-bar"></div>

<div class="color-grid" id="color-grid"></div>

<div class="celebration" id="celebration">
  🌈 ALLE FARVER! 🌈<br>
  <span style="font-size:1rem;font-weight:700">Du er en rigtig farve-detektiv!</span>
</div>

<button class="reset-btn" onclick="reset()">🔄 Start forfra</button>

<script>
const COLORS = [
  { name: 'Rød', hex: '#E53935', emoji: '🔴', example: 'Rød bil, stopskilt eller blomst' },
  { name: 'Blå', hex: '#1E88E5', emoji: '🔵', example: 'Blå bil, himlen eller havnen' },
  { name: 'Gul', hex: '#FDD835', emoji: '💛', example: 'Gul bus, solsikke eller taxi' },
  { name: 'Grøn', hex: '#43A047', emoji: '💚', example: 'Grøn skov, mark eller cykel' },
  { name: 'Orange', hex: '#FB8C00', emoji: '🟠', example: 'Orange bil eller vejskilt' },
  { name: 'Hvid', hex: '#ECEFF1', emoji: '⬜', example: 'Hvid lastbil, hus eller sky' },
  { name: 'Sort', hex: '#263238', emoji: '⬛', example: 'Sort bil eller asfalt' },
  { name: 'Lilla', hex: '#8E24AA', emoji: '💜', example: 'Lilla blomst eller hus' },
  { name: 'Lyserød', hex: '#F48FB1', emoji: '🩷', example: 'Lyserød bil, tøj eller is' },
  { name: 'Brun', hex: '#6D4C41', emoji: '🟤', example: 'Brun hest, ko eller planke' },
  { name: 'Grå', hex: '#78909C', emoji: '🩶', example: 'Grå lastbil eller sten' },
  { name: 'Turkis', hex: '#00ACC1', emoji: '🩵', example: 'Turkis hus, båd eller havet' },
];

let current = 0;
let found = [];

function render() {
  if (current < COLORS.length) {
    const c = COLORS[current];
    const card = document.getElementById('target-card');
    card.style.background = c.hex;
    card.style.color = isLight(c.hex) ? '#1A2E4A' : 'white';
    document.getElementById('color-name').textContent = c.name;
    document.getElementById('color-emoji').textContent = c.emoji;
    document.getElementById('color-example').textContent = c.example;
    document.getElementById('found-btn').style.display = 'block';
  } else {
    const card = document.getElementById('target-card');
    card.style.background = 'var(--sun)';
    card.style.color = 'var(--dark)';
    document.getElementById('color-name').textContent = '🏆';
    document.getElementById('color-emoji').textContent = '';
    document.getElementById('color-example').textContent = 'Du fandt dem alle!';
    document.getElementById('found-btn').style.display = 'none';
    document.getElementById('celebration').classList.add('show');
  }

  document.getElementById('score-bar').textContent = `⭐ ${current} af ${COLORS.length} farver fundet`;

  const grid = document.getElementById('color-grid');
  grid.innerHTML = '';
  COLORS.forEach((c, i) => {
    const chip = document.createElement('div');
    chip.className = 'color-chip' + (i < current ? ' done' : i === current ? ' active' : '');
    chip.style.background = c.hex;
    chip.innerHTML = `<span class="chip-emoji">${c.emoji}</span><span>${c.name}</span>`;
    grid.appendChild(chip);
  });
  save();
}

function isLight(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114) / 1000 > 160;
}

function colorFound() { if (current < COLORS.length) { current++; render(); } }
function reset() { current = 0; document.getElementById('celebration').classList.remove('show'); render(); }
function save() { try { localStorage.setItem('farve_current', current); } catch(e){} }
function load() { try { current = parseInt(localStorage.getItem('farve_current')) || 0; } catch(e){ current = 0; } }

load(); render();
</script>
</body>
</html>
