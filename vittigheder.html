<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Vittigheder 😂</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<a href="index.html" class="back-btn">←</a>
<h1>😂 Vittigheder!</h1>
<p class="sub">Tryk for at høre svaret!</p>

<div class="laugh-counter" id="laugh-counter">😂 0 grin</div>

<div class="source-tabs">
  <button class="src-btn active" id="btn-da" onclick="setSource('da')">🇩🇰 Danske</button>
  <button class="src-btn" id="btn-en" onclick="setSource('en')">🌍 Engelske</button>
</div>

<div class="joke-card" id="joke-card">
  <div class="joke-emoji" id="joke-emoji">😄</div>
  <div class="joke-setup" id="joke-setup">Henter vittighed...</div>
  <div class="joke-punchline" id="joke-punchline"></div>
  <div class="loading" id="loading">Henter vittighed... 🤔</div>
</div>

<button class="reveal-btn" id="reveal-btn" onclick="revealPunchline()">🤔 Hvad er svaret?</button>
<button class="next-btn" id="next-btn" onclick="nextJoke()">😂 Næste vittighed!</button>
<p class="eng-note" id="eng-note">🌍 Vittighed på engelsk — fra jokeapi.dev</p>

<script>
let laughs = 0;
let revealed = false;
let source = 'da';
let daJokes = [];
let daOrder = [];
let daIdx = 0;

// Load Danish jokes from JSON
async function loadDaJokes() {
  try {
    const res = await fetch('vittigheder.json');
    daJokes = await res.json();
    daOrder = shuffle([...Array(daJokes.length).keys()]);
  } catch(e) {
    // fallback inline
    daJokes = [
      {setup:"Hvorfor skulle den lille sky gå i skole?", punchline:"Den skulle lære at regne! 🌧️", emoji:"☁️"},
      {setup:"Hvordan får man en fisk til at grine?", punchline:"Man putter den i kildevand! 🐟", emoji:"🐟"},
      {setup:"Hvad siger det ene vejskilt til det andet: Er du gift?", punchline:"Nej, jeg er skilt! 🛑", emoji:"🛣️"},
      {setup:"Hvad kalder man en ko uden ben?", punchline:"En gravko! 🐄", emoji:"🐄"},
      {setup:"Hvad kalder man en bjørn uden tænder?", punchline:"En gummibamse! 🐻", emoji:"🐻"},
    ];
    daOrder = shuffle([...Array(daJokes.length).keys()]);
  }
}

function shuffle(arr) {
  const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a;
}

function setSource(src) {
  source = src;
  document.getElementById('btn-da').classList.toggle('active', src === 'da');
  document.getElementById('btn-en').classList.toggle('active', src === 'en');
  nextJoke();
}

function showJoke(joke) {
  revealed = false;
  document.getElementById('loading').classList.remove('show');
  document.getElementById('joke-emoji').textContent = joke.emoji || '😄';
  document.getElementById('joke-setup').textContent = joke.setup;
  document.getElementById('joke-punchline').textContent = joke.punchline;
  document.getElementById('joke-punchline').classList.remove('show');
  document.getElementById('reveal-btn').style.display = 'block';
  document.getElementById('reveal-btn').disabled = false;
  document.getElementById('next-btn').className = 'next-btn';
  document.getElementById('eng-note').className = source === 'en' ? 'eng-note show' : 'eng-note';
}

function showDaJoke() {
  if (daJokes.length === 0) return;
  if (daIdx >= daOrder.length) { daOrder = shuffle([...Array(daJokes.length).keys()]); daIdx = 0; }
  const joke = daJokes[daOrder[daIdx++]];
  showJoke(joke);
}

async function showEnJoke() {
  document.getElementById('loading').classList.add('show');
  document.getElementById('joke-setup').textContent = '';
  document.getElementById('reveal-btn').disabled = true;
  try {
    const res = await fetch('https://v2.jokeapi.dev/joke/Pun,Misc?blacklistFlags=nsfw,religious,political,racist,sexist,explicit&type=twopart', {signal: AbortSignal.timeout(4000)});
    const data = await res.json();
    if (data?.setup && data?.delivery) {
      showJoke({setup: data.setup, punchline: data.delivery, emoji: '😂'});
      return;
    }
  } catch(e) {}
  // fallback to danish if offline
  source = 'da';
  document.getElementById('btn-da').classList.add('active');
  document.getElementById('btn-en').classList.remove('active');
  showDaJoke();
}

function nextJoke() {
  if (source === 'da') showDaJoke();
  else showEnJoke();
}

function revealPunchline() {
  if (revealed) return;
  revealed = true;
  document.getElementById('joke-punchline').classList.add('show');
  document.getElementById('reveal-btn').style.display = 'none';
  document.getElementById('next-btn').className = 'next-btn show';
  laughs++;
  document.getElementById('laugh-counter').textContent = `😂 ${laughs} grin`;
}

// Init
loadDaJokes().then(() => showDaJoke());
</script>
</body>
</html>
