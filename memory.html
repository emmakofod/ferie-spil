<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Bornholm Memory 🃏</title>
<link rel="stylesheet" href="shared.css">
<style>
.diff-row {
  display: flex; justify-content: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
}
.diff-btn {
  padding: 10px 18px; border-radius: 999px;
  border: 3px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.15); color: white;
  font-family: 'Fredoka One', cursive; font-size: 0.9rem; cursor: pointer; touch-action: manipulation;
}
.diff-btn.active { background: white; color: var(--dark); }
.diff-btn:active { transform: scale(0.95); }

.info-bar {
  display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 14px;
}
.info-chip {
  background: rgba(255,255,255,0.9); border-radius: 999px; padding: 8px 18px;
  font-family: 'Fredoka One', cursive; font-size: 1rem; color: var(--dark);
}

.memory-grid {
  display: grid; gap: 8px; max-width: 560px; margin: 0 auto 16px;
}
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-5 { grid-template-columns: repeat(5, 1fr); }
.grid-6 { grid-template-columns: repeat(6, 1fr); }

.mem-card {
  aspect-ratio: 1; cursor: pointer; touch-action: manipulation;
  perspective: 600px;
}
.mem-inner {
  width: 100%; height: 100%;
  position: relative; transform-style: preserve-3d;
  transition: transform 0.35s ease; border-radius: 14px;
}
.mem-card.flipped .mem-inner { transform: rotateY(180deg); }
.mem-front, .mem-back {
  position: absolute; inset: 0; border-radius: 14px;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  display: flex; align-items: center; justify-content: center;
  border: 3px solid rgba(255,255,255,0.2);
}
.mem-front {
  background: var(--deep);
  font-size: clamp(1.2rem, 4vw, 1.8rem);
}
.mem-back {
  background: white; transform: rotateY(180deg);
  font-size: clamp(1.5rem, 5vw, 2.4rem); flex-direction: column; gap: 2px;
}
.mem-back .card-word { font-size: clamp(0.6rem, 1.6vw, 0.72rem); font-weight: 800; color: var(--dark); }
.mem-card.matched .mem-front { background: var(--green); border-color: #2d6e4a; }
.mem-card.matched .mem-back { background: #d4f5e0; }

.restart-btn {
  display: block; margin: 12px auto 0; padding: 14px 28px;
  border-radius: 14px; border: 3px solid rgba(255,255,255,0.5);
  background: rgba(255,255,255,0.15); color: white;
  font-family: 'Fredoka One', cursive; font-size: 1rem; cursor: pointer;
}
.restart-btn:active { background: white; color: var(--dark); }
</style>
</head>
<body>
<a href="index.html" class="back-btn">← Hjem</a>
<h1>🃏 Bornholm Memory</h1>
<p class="sub">Find to ens Bornholm-ting!</p>

<div class="diff-row">
  <button class="diff-btn active" onclick="setDiff(8,'grid-4')">🐣 Let (8 par)</button>
  <button class="diff-btn" onclick="setDiff(10,'grid-5')">🌊 Mellem (10 par)</button>
  <button class="diff-btn" onclick="setDiff(18,'grid-6')">🦁 Svær (18 par)</button>
</div>

<div class="info-bar">
  <div class="info-chip" id="moves-chip">🔄 0 forsøg</div>
  <div class="info-chip" id="pairs-chip">✅ 0 par</div>
</div>

<div class="memory-grid grid-4" id="memory-grid"></div>

<div class="celebration" id="celebration">
  🚢 BORNHOLM MESTER! 🏝️<br>
  <span id="final-moves" style="font-size:1rem;font-weight:700"></span>
</div>

<button class="restart-btn" onclick="startGame()">🔄 Ny omgang</button>

<script>
const ALL_ITEMS = [
  { emoji: '🚢', word: 'Færge' },
  { emoji: '⛪', word: 'Rundkirke' },
  { emoji: '🪨', word: 'Klippe' },
  { emoji: '🌊', word: 'Hav' },
  { emoji: '🦅', word: 'Måge' },
  { emoji: '🏖️', word: 'Strand' },
  { emoji: '🌲', word: 'Fyrskov' },
  { emoji: '🚲', word: 'Cykel' },
  { emoji: '🐚', word: 'Musling' },
  { emoji: '🍦', word: 'Is' },
  { emoji: '⛵', word: 'Sejlbåd' },
  { emoji: '🌅', word: 'Solnedgang' },
  { emoji: '🐟', word: 'Fisk' },
  { emoji: '🏚️', word: 'Røgeri' },
  { emoji: '🌸', word: 'Lyng' },
  { emoji: '💨', word: 'Vindmølle' },
  { emoji: '🎣', word: 'Fisker' },
  { emoji: '🐄', word: 'Ko' },
];

let cards=[], flipped=[], matched=[], moves=0, locked=false, pairCount=8, gridClass='grid-4';

function setDiff(pairs, gc) {
  pairCount=pairs; gridClass=gc;
  document.querySelectorAll('.diff-btn').forEach((b,i) => b.classList.toggle('active', [8,10,18][i]===pairs));
  startGame();
}

function shuffle(arr) {
  const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;
}

function startGame() {
  flipped=[]; matched=[]; moves=0; locked=false;
  document.getElementById('celebration').classList.remove('show');
  const chosen = shuffle(ALL_ITEMS).slice(0, pairCount);
  cards = shuffle([...chosen, ...chosen].map((c,i) => ({...c, id:i})));
  render();
}

function render() {
  const grid = document.getElementById('memory-grid');
  grid.className = 'memory-grid ' + gridClass;
  grid.innerHTML = '';
  cards.forEach((c,i) => {
    const isFlipped = flipped.includes(i) || matched.includes(c.emoji);
    const isMatched = matched.includes(c.emoji);
    const div = document.createElement('div');
    div.className = 'mem-card' + (isFlipped?' flipped':'') + (isMatched?' matched':'');
    div.innerHTML = `<div class="mem-inner">
      <div class="mem-front">🌊</div>
      <div class="mem-back">${c.emoji}<span class="card-word">${c.word}</span></div>
    </div>`;
    div.onclick = () => flip(i, c.emoji);
    grid.appendChild(div);
  });
  document.getElementById('moves-chip').textContent = `🔄 ${moves} forsøg`;
  document.getElementById('pairs-chip').textContent = `✅ ${matched.length} par`;
}

function flip(idx, emoji) {
  if (locked||flipped.includes(idx)||matched.includes(emoji)||flipped.length>=2) return;
  flipped.push(idx); render();
  if (flipped.length===2) {
    moves++;
    locked=true;
    const [a,b]=flipped;
    if (cards[a].emoji===cards[b].emoji) {
      matched.push(cards[a].emoji); flipped=[]; locked=false; render();
      if (matched.length===pairCount) {
        setTimeout(()=>{
          document.getElementById('final-moves').textContent=`Klaret på ${moves} forsøg!`;
          document.getElementById('celebration').classList.add('show');
        },300);
      }
    } else {
      setTimeout(()=>{ flipped=[]; locked=false; render(); }, 900);
    }
  }
}

startGame();
</script>
</body>
</html>
