<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Bornholm Memory 🃏</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<a href="index.html" class="back-btn">← </a>
<h1>🃏 Bornholm Memory</h1>
<p class="sub">Find to ens Bornholm-ting!</p>

<div class="diff-row">
  <button class="diff-btn active" onclick="setDiff(8,'grid-4')">🐣 Let (8 par)</button>
  <button class="diff-btn" onclick="setDiff(10,'grid-5')">🌊 Mellem (10 par)</button>
  <button class="diff-btn" onclick="setDiff(18,'grid-6')">🦁 Svær (18 par)</button>
</div>

<div class="info-bar">
  <div class="info-chip" id="moves-chip">🔄 0 forsøg</div>
  <div class="info-chip" id="pairs-chip">✅ 0 par</div>
</div>

<div class="memory-grid grid-4" id="memory-grid"></div>

<div class="celebration" id="celebration">
  🚢 BORNHOLM MESTER! 🏝️<br>
  <span id="final-moves" style="font-size:1rem;font-weight:700"></span>
</div>

<button class="restart-btn" onclick="startGame()">🔄 Ny omgang</button>

<script>
const ALL_ITEMS = [
  { img: 'assets/faerge.jpg', word: 'Færge' },
  { img: 'assets/kirke.webp', word: 'Rundkirke' },
  { img: 'assets/klip.jpg', word: 'Klippe' },
  { img: 'assets/hav.jpg', word: 'Hav' },
  { img: 'assets/maage.jpg', word: 'Måge' },
  { img: 'assets/strand.jpg', word: 'Strand' },
  { img: 'assets/rokkesten.jpg', word: 'Rokkesten' },
  { img: 'assets/trold.jpg', word: 'Krølle Bølle' },
  { img: 'assets/musling.jpg', word: 'Musling' },
  { img: 'assets/is.jpg', word: 'Is' },
  { img: 'assets/trapper.jpb', word: 'Trapper' },
  { img: 'assets/sol.jpg', word: 'Solnedgang' },
  { img: 'assets/fisk.jpg', word: 'Fisk' },
  { img: 'assets/roegeri.webp', word: 'Røgeri' },
  { img: 'assets/lyng', word: 'Lyng' },
  { img: 'assets/vindmølle.webp', word: 'Vindmølle' },
  { img: 'assets/lomvier.webp', word: 'Lomvier' },
  { img: 'assets/bornholm.png', word: 'Bornholm' },
];

let cards=[], flipped=[], matched=[], moves=0, locked=false, pairCount=8, gridClass='grid-4';

function setDiff(pairs, gc) {
  pairCount=pairs; gridClass=gc;
  document.querySelectorAll('.diff-btn').forEach((b,i) => b.classList.toggle('active', [8,10,18][i]===pairs));
  startGame();
}

function shuffle(arr) {
  const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;
}

function startGame() {
  flipped=[]; matched=[]; moves=0; locked=false;
  document.getElementById('celebration').classList.remove('show');
  const chosen = shuffle(ALL_ITEMS).slice(0, pairCount);
  cards = shuffle([...chosen, ...chosen].map((c,i) => ({...c, id:i})));
  render();
}

function render() {
  const grid = document.getElementById('memory-grid');
  grid.className = 'memory-grid ' + gridClass;
  grid.innerHTML = '';
  cards.forEach((c,i) => {
const isFlipped = flipped.includes(i) || matched.includes(c.word);
const isMatched = matched.includes(c.word);
    const div = document.createElement('div');
    div.className = 'mem-card' + (isFlipped?' flipped':'') + (isMatched?' matched':'');
   div.innerHTML = `<div class="mem-inner">
  <div class="mem-front">🌊</div>
  <div class="mem-back">
    ${c.img
      ? `<img src="${c.img}" style="width:100%;height:100%;object-fit:cover;border-radius:11px;">`
      : c.emoji}
  </div>
</div>`;
div.onclick = () => flip(i, c.word);
    grid.appendChild(div);
  });
  document.getElementById('moves-chip').textContent = `🔄 ${moves} forsøg`;
  document.getElementById('pairs-chip').textContent = `✅ ${matched.length} par`;
}

function flip(idx, word) {
  if (locked||flipped.includes(idx)||matched.includes(word)||flipped.length>=2) return;
  flipped.push(idx); render();
  if (flipped.length===2) {
    moves++;
    locked=true;
    const [a,b]=flipped;
    if (cards[a].word===cards[b].word) {
      matched.push(cards[a].word); flipped=[]; locked=false; render();
      if (matched.length===pairCount) {
        setTimeout(()=>{
          document.getElementById('final-moves').textContent=`Klaret på ${moves} forsøg!`;
          document.getElementById('celebration').classList.add('show');
        },300);
      }
    } else {
      setTimeout(()=>{ flipped=[]; locked=false; render(); }, 900);
    }
  }
}

startGame();
</script>
</body>
</html>
