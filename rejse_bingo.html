<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Bornholm Bingo 🚢</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>

<div class="top-nav" style="margin-bottom:12px"><a href="index.html" style="display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:999px;border:3px solid #1B6CA8;background:white;color:#1B6CA8;font-family:Fredoka One,cursive;font-size:1rem;text-decoration:none">←</a></div><header>
  <h1>🚢 Bornholm Bingo!</h1>
  <p class="subtitle">Fra København til Bornholm — hvad kan du spotte?</p>
</header>

<div class="waves">🌊🌊🌊</div>

<div class="phase-tabs" id="tabs"></div>

<div class="score-bar">
  <div class="score-display" id="score"></div>
  <button class="reset-btn" onclick="resetAll()">🔄 Start forfra</button>
</div>

<div class="celebration" id="celebration">
  🎉 Woooow! Du fandt dem alle! 🎉<br>
  <span style="font-size:1rem;font-weight:700">Du er en ægte Bornholm-spejder!</span>
</div>

<p class="phase-label" id="phase-label"></p>

<div class="grid" id="grid"></div>

<footer>Tryk på billedet når du ser det ude af vinduet! 🌊</footer>

<script>
const phases = [
  {
    id: "bil",
    label: "🚗 I bilen",
    desc: "Fra København til Køge Bugt Motorvej",
    items: [
      { emoji: "🚦", label: "Rødt lys" },
      { emoji: "🏗️", label: "Byggekran" },
      { img: "assets/yellow_bus.png", label: "Gul bus" },
      { img: "assets/flok_fugl.png", label: "Flok fugle" },
      { img: "assets/gas_station.png", label: "Benzinstation" },
      { emoji: "🌳", label: "Skov langs vejen" },
      { emoji: "🐄", label: "Ko på mark" },
      { emoji: "🌾", label: "Kornmark" },
      { img: "assets/wind-turbine.png", label: "Vindmølle" },
      { emoji: "🚜", label: "Traktor" },
      { emoji: "🏠", label: "Gult hus" },
      { emoji: "🛣️", label: "Motorvejsskilt" },
    ]
  },
  {
    id: "havn",
    label: "⚓ Havnen",
    desc: "Rønne Havn eller Køge — inden I kører ombord",
    items: [
      { emoji: "⚓", label: "Anker / fortøjning" },
      { img: "assets/seagull.png", label: "Måge" },
      { emoji: "🐟", label: "Fisk i vandet" },
      { emoji: "🚢", label: "Kæmpe færge" },
      { emoji: "⛵", label: "Sejlbåd" },
      { emoji: "🏗️", label: "Kran ved havn" },
      { emoji: "🪣", label: "Spand og reb" },
      { emoji: "👷🏼‍♀️", label: "Havneassistant" },
      { img: "assets/lighthouse.png", label: "Fyr eller lys" },
      { emoji: "🅿️", label: "P-plads til biler" },
      { emoji: "🚦", label: "Grønt lys" },
      { emoji: "🚌", label: "Bus" },
    ]
  },
  {
    id: "faerge",
    label: "🚢 På færgen",
    desc: "Over Østersøen — ~80 minutter",
    items: [
      { emoji: "🌊", label: "Hvide bølger" },
      { emoji: "🦆", label: "Fugl" },
      { emoji: "☁️", label: "Sky der ligner noget" },
      { emoji: "⛵", label: "Sejlbåd i det fjerne" },
      { emoji: "🐬", label: "Delfin" },
      { emoji: "🌅", label: "Solskin på vandet" },
      { emoji: "🚢", label: "Et andet færge" },
      { emoji: "🪼", label: "Vandmand" },
      { img: "assets/seagull.png", label: "Måge der flyver med" },
      { img: "assets/wind-turbine.png", label: "Vindmølle i havet" },
      { emoji: "🏝️", label: "Land i horisonten" },
      { emoji: "🌈", label: "Regnbue" },
    ]
  },
  {
    id: "bornholm",
    label: "🏝️ Bornholm!",
    desc: "Når I nærmer jer og kører rundt",
    items: [
      { emoji: "⛪", label: "Rundt kirketårn" },
      { emoji: "🌲", label: "Skov" },
      { emoji: "🪨", label: "Klippesten" },
      { emoji: "🚲", label: "Cyklist" },
      { emoji: "🐑", label: "Får på mark" },
      { emoji: "🍦", label: "Isbutik" },
      { emoji: "🎣", label: "Fisker" },
      { emoji: "🏖️", label: "Sandstrand" },
      { emoji: "🌸", label: "Blomster" },
      { emoji: "🏚️", label: "Gammelt bygning" },
      { emoji: "👨🏽‍👩🏽‍👧🏽", label: "Familie" },
      { emoji: "🏡", label: "Vores hus!" },
    ]
  }
];

let current = "bil";
let found = {};

function init() {
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = "";
  phases.forEach(p => {
    const btn = document.createElement("button");
    btn.className = "tab" + (p.id === current ? " active" : "");
    btn.textContent = p.label;
    btn.onclick = () => { current = p.id; render(); };
    tabsEl.appendChild(btn);
  });
  

  const phase = phases.find(p => p.id === current);
  document.getElementById("phase-label").textContent = phase.desc;

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  phase.items.forEach((item, i) => {
    const key = current + "_" + i;
    const card = document.createElement("div");
    card.className = "card" + (found[key] ? " found" : "");
card.innerHTML = `
  ${item.img
    ? `<img src="${item.img}" style="width:3rem;height:3rem;object-fit:contain">`
    : `<span class="emoji">${item.emoji}</span>`}
  <span class="found-stamp">✅</span>
  <div class="label">${item.label}</div>
`;
    card.onclick = () => toggle(key, card);
    grid.appendChild(card);
  });
  

  updateScore();
}

function render() { init(); }

function toggle(key, card) {
  found[key] = !found[key];
  card.classList.toggle("found", found[key]);
  updateScore();
}

function updateScore() {
  const phase = phases.find(p => p.id === current);
  const phaseTotal = phase.items.length;
  const total = phase.items.filter((_, idx) => found[current + "_" + idx]).length;
  
  document.getElementById("score").textContent = `⭐ ${total} / ${phaseTotal} fundet`;

  const allTotal = phases.reduce((sum, p) => sum + p.items.length, 0);
  const cel = document.getElementById("celebration");
  if (Object.values(found).filter(Boolean).length === allTotal) cel.classList.add("show");
  else cel.classList.remove("show");

  const tabsEl = document.getElementById("tabs");
  Array.from(tabsEl.children).forEach((btn, i) => {
    const p = phases[i];
    const pFound = p.items.filter((_, idx) => found[p.id + "_" + idx]).length;
    btn.className = "tab" + (p.id === current ? " active" : "");
    btn.textContent = pFound > 0 ? `${p.label} (${pFound}/${p.items.length})` : p.label;
  });
}

function resetAll() {
  found = {};
  render();
}

init();
</script>
</body>
</html>
