<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Bornholm Bingo 🚢</title>
<link rel="stylesheet" href="shared.css">
<style>
header {
    text-align: center;
    padding: 28px 0 10px;
  }

  .subtitle {
    font-size: clamp(0.95rem, 2.5vw, 1.1rem);
    color: var(--sea);
    font-weight: 700;
    margin-top: 6px;
  }

  /* ---- TABS ---- */
  .phase-tabs {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin: 18px 0 12px;
    max-width: 720px;
    margin-left: auto;
    margin-right: auto;
  }

  .tab {
    padding: 14px 10px;
    border-radius: 16px;
    border: 3px solid var(--sea);
    background: var(--white);
    color: var(--sea);
    font-family: 'Fredoka One', cursive;
    font-size: clamp(0.95rem, 2.2vw, 1.1rem);
    cursor: pointer;
    transition: all 0.2s;
    /* Big touch target */
    min-height: 56px;
    touch-action: manipulation;
    line-height: 1.2;
  }

  .tab.active {
    background: var(--sea);
    color: var(--white);
    border-color: var(--sea);
    box-shadow: 0 4px 12px rgba(27,108,168,0.35);
    transform: scale(1.03);
  }

  /* ---- SCORE BAR ---- */
  .score-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .score-display {
    background: var(--sun);
    border-radius: 16px;
    padding: 12px 28px;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.2rem, 3vw, 1.5rem);
    color: var(--dark);
    border: 3px solid var(--dark);
    box-shadow: 3px 3px 0 var(--dark);
  }

  .reset-btn {
    padding: 12px 22px;
    border-radius: 14px;
    border: 3px solid var(--coral);
    background: var(--white);
    color: var(--coral);
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    min-height: 50px;
    touch-action: manipulation;
  }
  .reset-btn:active { background: var(--coral); color: white; }

  /* ---- GRID ---- */
  .grid {
    display: grid;
    /* iPad portrait: 4 cols, landscape: 5 cols */
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    max-width: 720px;
    margin: 0 auto;
  }

  @media (min-width: 900px) {
    .grid { grid-template-columns: repeat(5, 1fr); }
  }
  @media (max-width: 500px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
    .phase-tabs { grid-template-columns: repeat(2, 1fr); }
  }

  /* ---- CARD ---- */
  .card {
    background: var(--white);
    border-radius: 18px;
    border: 3px solid var(--dark);
    padding: 18px 8px 14px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
    box-shadow: 3px 3px 0 var(--dark);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    /* Minimum touch target */
    min-height: 110px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .card:active { transform: scale(0.92); }

  .card.found {
    background: var(--green);
    border-color: #3a7a3a;
    box-shadow: 3px 3px 0 #3a7a3a;
  }

  .card .emoji {
    font-size: clamp(2rem, 5vw, 2.6rem);
    line-height: 1;
    display: block;
  }

  .card .label {
    font-size: clamp(0.72rem, 1.8vw, 0.85rem);
    font-weight: 800;
    line-height: 1.2;
    color: var(--dark);
  }

  .card.found .label { color: white; }

  .card .found-stamp {
    display: none;
    font-size: 1.6rem;
  }
  .card.found .found-stamp { display: block; }
  .card.found .emoji { opacity: 0.4; font-size: 1.3rem; }

  .waves {
    text-align: center;
    font-size: 2rem;
    margin: 6px 0 14px;
    animation: wave 2s ease-in-out infinite;
  }

  .phase-label {
    text-align: center;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(0.95rem, 2.5vw, 1.15rem);
    color: var(--sea);
    margin-bottom: 14px;
  }

  footer {
    text-align: center;
    padding: 24px 0 12px;
    font-size: 0.85rem;
    color: var(--sea);
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="top-nav" style="margin-bottom:12px"><a href="index.html" style="display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:999px;border:3px solid #1B6CA8;background:white;color:#1B6CA8;font-family:Fredoka One,cursive;font-size:1rem;text-decoration:none">← Hjem</a></div><header>
  <h1>🚢 Bornholm Bingo!</h1>
  <p class="subtitle">Fra København til Bornholm — hvad kan du spotte?</p>
</header>

<div class="waves">🌊🌊🌊</div>

<div class="phase-tabs" id="tabs"></div>

<div class="score-bar">
  <div class="score-display" id="score">⭐ 0 fundet</div>
  <button class="reset-btn" onclick="resetAll()">🔄 Start forfra</button>
</div>

<div class="celebration" id="celebration">
  🎉 Woooow! Du fandt dem alle! 🎉<br>
  <span style="font-size:1rem;font-weight:700">Du er en ægte Bornholm-spejder!</span>
</div>

<p class="phase-label" id="phase-label"></p>

<div class="grid" id="grid"></div>

<footer>Tryk på billedet når du ser det ude af vinduet! 🌊</footer>

<script>
const phases = [
  {
    id: "bil",
    label: "🚗 I bilen",
    desc: "Fra København til Køge Bugt Motorvej",
    items: [
      { emoji: "🚦", label: "Rødt lys" },
      { emoji: "🏗️", label: "Byggekran" },
      { emoji: "🚌", label: "Gul bus" },
      { emoji: "🐦", label: "Flok fugle" },
      { emoji: "⛽", label: "Benzintank" },
      { emoji: "🌳", label: "Skov langs vejen" },
      { emoji: "🐄", label: "Ko på mark" },
      { emoji: "🌾", label: "Kornmark" },
      { emoji: "💨", label: "Vindmølle" },
      { emoji: "🚜", label: "Traktor" },
      { emoji: "🏠", label: "Rødt hus" },
      { emoji: "🛣️", label: "Motorvejsskilt" },
    ]
  },
  {
    id: "havn",
    label: "⚓ Havnen",
    desc: "Rønne Havn eller Køge — inden I kører ombord",
    items: [
      { emoji: "⚓", label: "Anker / fortøjning" },
      { emoji: "🦅", label: "Måge" },
      { emoji: "🐟", label: "Fisk i vandet" },
      { emoji: "🚢", label: "Kæmpe færge" },
      { emoji: "⛵", label: "Sejlbåd" },
      { emoji: "🧲", label: "Kran ved havn" },
      { emoji: "🪣", label: "Spand og reb" },
      { emoji: "🔦", label: "Fyr eller lys" },
      { emoji: "🅿️", label: "P-plads til biler" },
    ]
  },
  {
    id: "faerge",
    label: "🚢 På færgen",
    desc: "Over Østersøen — ~80 minutter",
    items: [
      { emoji: "🌊", label: "Hvide bølger" },
      { emoji: "🦆", label: "Edderfugl" },
      { emoji: "☁️", label: "Sky der ligner noget" },
      { emoji: "⛵", label: "Sejlbåd i det fjerne" },
      { emoji: "🐬", label: "Marsvin / delfin" },
      { emoji: "🌅", label: "Solskin på vandet" },
      { emoji: "🚢", label: "Et andet skib" },
      { emoji: "🪼", label: "Vandmand" },
      { emoji: "🦅", label: "Måge der flyver med" },
      { emoji: "💨", label: "Vindmølle i havet" },
      { emoji: "🏝️", label: "Land i horisonten" },
      { emoji: "🌈", label: "Regnbue" },
    ]
  },
  {
    id: "bornholm",
    label: "🏝️ Bornholm!",
    desc: "Når I nærmer jer og kører rundt",
    items: [
      { emoji: "⛪", label: "Rundt kirketårn" },
      { emoji: "🌲", label: "Fyrreskov" },
      { emoji: "🪨", label: "Klippesten" },
      { emoji: "🚲", label: "Cyklist" },
      { emoji: "🐑", label: "Får på mark" },
      { emoji: "🍦", label: "Isbutik" },
      { emoji: "🎣", label: "Fisker" },
      { emoji: "🏖️", label: "Sandstrand" },
      { emoji: "🌸", label: "Lyng / hedeblomst" },
      { emoji: "🏚️", label: "Gammelt røgeri" },
    ]
  }
];

let current = "bil";
let found = {};

function init() {
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = "";
  phases.forEach(p => {
    const btn = document.createElement("button");
    btn.className = "tab" + (p.id === current ? " active" : "");
    btn.textContent = p.label;
    btn.onclick = () => { current = p.id; render(); };
    tabsEl.appendChild(btn);
  });

  const phase = phases.find(p => p.id === current);
  document.getElementById("phase-label").textContent = phase.desc;

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  phase.items.forEach((item, i) => {
    const key = current + "_" + i;
    const card = document.createElement("div");
    card.className = "card" + (found[key] ? " found" : "");
    card.innerHTML = `<span class="emoji">${item.emoji}</span><span class="found-stamp">✅</span><div class="label">${item.label}</div>`;
    card.onclick = () => toggle(key, card);
    grid.appendChild(card);
  });

  updateScore();
}

function render() { init(); }

function toggle(key, card) {
  found[key] = !found[key];
  card.classList.toggle("found", found[key]);
  updateScore();
}

function updateScore() {
  const total = Object.values(found).filter(Boolean).length;
  document.getElementById("score").textContent = `⭐ ${total} fundet`;

  const allTotal = phases.reduce((sum, p) => sum + p.items.length, 0);
  const cel = document.getElementById("celebration");
  if (total === allTotal) cel.classList.add("show");
  else cel.classList.remove("show");

  const tabsEl = document.getElementById("tabs");
  Array.from(tabsEl.children).forEach((btn, i) => {
    const p = phases[i];
    const pFound = p.items.filter((_, idx) => found[p.id + "_" + idx]).length;
    btn.className = "tab" + (p.id === current ? " active" : "");
    btn.textContent = pFound > 0 ? `${p.label} (${pFound}/${p.items.length})` : p.label;
  });
}

function resetAll() {
  found = {};
  render();
}

init();
</script>
</body>
</html>
