<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Farve-quiz 🎨</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<a href="index.html" class="back-btn">← </a>
<h1>🎨 Farve-quiz!</h1>
<p class="sub">Hvad sker der når man blander to farver?</p>

<div class="score-row">
  <div class="chip" id="score-chip">⭐ 0 point</div>
  <div class="chip" id="q-chip">Spørgsmål 1</div>
</div>

<div class="mix-card">
  <div class="mix-label">Hvad får du hvis du blander...</div>
  <div class="swatches">
    <div class="swatch" id="swatch-a"></div>
    <div class="plus-sign">+</div>
    <div class="swatch" id="swatch-b"></div>
  </div>
  <div class="swatch-labels">
    <div class="swatch-name" id="name-a"></div>
    <div class="plus-spacer"></div>
    <div class="swatch-name" id="name-b"></div>
  </div>
</div>

<div class="answer-grid" id="answer-grid"></div>

<div class="feedback" id="feedback"></div>
<button class="next-btn" id="next-btn" onclick="nextQ()">➡️ Næste spørgsmål</button>

<script>
const QUESTIONS = [
  { a:{name:'Rød',hex:'#E53935'}, b:{name:'Gul',hex:'#FDD835'}, correct:'Orange', answers:['Orange','Grøn','Lilla','Brun'], hex:{'Orange':'#FB8C00','Grøn':'#43A047','Lilla':'#8E24AA','Brun':'#6D4C41'} },
  { a:{name:'Blå',hex:'#1E88E5'}, b:{name:'Gul',hex:'#FDD835'}, correct:'Grøn', answers:['Orange','Grøn','Lilla','Turkis'], hex:{'Orange':'#FB8C00','Grøn':'#43A047','Lilla':'#8E24AA','Turkis':'#00ACC1'} },
  { a:{name:'Rød',hex:'#E53935'}, b:{name:'Blå',hex:'#1E88E5'}, correct:'Lilla', answers:['Orange','Grøn','Lilla','Brun'], hex:{'Orange':'#FB8C00','Grøn':'#43A047','Lilla':'#8E24AA','Brun':'#6D4C41'} },
  { a:{name:'Rød',hex:'#E53935'}, b:{name:'Hvid',hex:'#ECEFF1'}, correct:'Lyserød', answers:['Lyserød','Orange','Lilla','Beige'], hex:{'Lyserød':'#F48FB1','Orange':'#FB8C00','Lilla':'#8E24AA','Beige':'#D7CCC8'} },
  { a:{name:'Blå',hex:'#1E88E5'}, b:{name:'Hvid',hex:'#ECEFF1'}, correct:'Lyseblå', answers:['Lyseblå','Turkis','Grøn','Grå'], hex:{'Lyseblå':'#90CAF9','Turkis':'#00ACC1','Grøn':'#43A047','Grå':'#90A4AE'} },
  { a:{name:'Sort',hex:'#263238'}, b:{name:'Hvid',hex:'#ECEFF1'}, correct:'Grå', answers:['Grå','Beige','Brun','Lyseblå'], hex:{'Grå':'#90A4AE','Beige':'#D7CCC8','Brun':'#6D4C41','Lyseblå':'#90CAF9'} },
  { a:{name:'Rød',hex:'#E53935'}, b:{name:'Sort',hex:'#263238'}, correct:'Mørkerød', answers:['Mørkerød','Lilla','Brun','Orange'], hex:{'Mørkerød':'#B71C1C','Lilla':'#8E24AA','Brun':'#6D4C41','Orange':'#FB8C00'} },
  { a:{name:'Gul',hex:'#FDD835'}, b:{name:'Hvid',hex:'#ECEFF1'}, correct:'Lysegul', answers:['Lysegul','Beige','Orange','Grøn'], hex:{'Lysegul':'#FFF9C4','Beige':'#D7CCC8','Orange':'#FB8C00','Grøn':'#43A047'} },
  { a:{name:'Blå',hex:'#1E88E5'}, b:{name:'Grøn',hex:'#43A047'}, correct:'Turkis', answers:['Turkis','Lilla','Lyseblå','Grå'], hex:{'Turkis':'#00ACC1','Lilla':'#8E24AA','Lyseblå':'#90CAF9','Grå':'#90A4AE'} },
  { a:{name:'Orange',hex:'#FB8C00'}, b:{name:'Rød',hex:'#E53935'}, correct:'Rødorange', answers:['Rødorange','Brun','Lilla','Gul'], hex:{'Rødorange':'#E64A19','Brun':'#6D4C41','Lilla':'#8E24AA','Gul':'#FDD835'} },
  { a:{name:'Grøn',hex:'#43A047'}, b:{name:'Gul',hex:'#FDD835'}, correct:'Limegrøn', answers:['Limegrøn','Turkis','Orange','Lysegrøn'], hex:{'Limegrøn':'#AEEA00','Turkis':'#00ACC1','Orange':'#FB8C00','Lysegrøn':'#A5D6A7'} },
  { a:{name:'Lilla',hex:'#8E24AA'}, b:{name:'Rød',hex:'#E53935'}, correct:'Magenta', answers:['Magenta','Orange','Mørkerød','Lyserød'], hex:{'Magenta':'#AD1457','Orange':'#FB8C00','Mørkerød':'#B71C1C','Lyserød':'#F48FB1'} },
];

let order = [];
let qIdx = 0;
let score = 0;
let answered = false;

function shuffle(arr) {
  const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a;
}

function start() {
  order = shuffle([...Array(QUESTIONS.length).keys()]);
  qIdx = 0; score = 0;
  nextQ();
}

function renderQ() {
  answered = false;
  const q = QUESTIONS[order[qIdx % order.length]];
  document.getElementById('swatch-a').style.background = q.a.hex;
  document.getElementById('swatch-b').style.background = q.b.hex;
  document.getElementById('name-a').textContent = q.a.name;
  document.getElementById('name-b').textContent = q.b.name;
  document.getElementById('q-chip').textContent = `Spørgsmål ${qIdx+1}`;
  document.getElementById('score-chip').textContent = `⭐ ${score} point`;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').className = 'next-btn';

  const grid = document.getElementById('answer-grid');
  grid.innerHTML = '';
  shuffle(q.answers).forEach(ans => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.style.background = 'white';
    const sw = document.createElement('div');
    sw.className = 'ans-swatch';
    sw.style.background = q.hex[ans];
    btn.appendChild(sw);
    btn.appendChild(document.createTextNode(ans));
    btn.onclick = () => checkAnswer(ans, q.correct, btn, q.hex[q.correct]);
    grid.appendChild(btn);
  });
}

function checkAnswer(ans, correct, btn, correctHex) {
  if (answered) return;
  answered = true;
  const fb = document.getElementById('feedback');
  if (ans === correct) {
    score++;
    fb.textContent = '✅ Rigtigt! Super! 🎉';
    fb.className = 'feedback correct show';
    btn.style.background = '#d4f5e0';
  } else {
    fb.innerHTML = `❌ Næ! Det bliver <span style="color:white;font-size:1rem">${correct}</span>`;
    fb.className = 'feedback wrong show';
    // highlight correct
    document.querySelectorAll('.answer-btn').forEach(b => {
      if (b.textContent.trim() === correct) b.style.background = '#d4f5e0';
    });
  }
  document.getElementById('score-chip').textContent = `⭐ ${score} point`;
  document.getElementById('next-btn').className = 'next-btn show';
}

function nextQ() { qIdx++; renderQ(); }

start();
</script>
</body>
</html>
