<!DOCTYPE html>
<html lang="da">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tegne-spil 🎨</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap');

    :root {
      --sea: #1B6CA8;
      --deep: #0D3B6E;
      --sun: #FFD447;
      --coral: #FF6B6B;
      --green: #4CAF7D;
      --dark: #1A2E4A;
      --p1: #FFB3BA;
      --p2: #FFCBA4;
      --p3: #FFF3A3;
      --p4: #B5EAD7;
      --p5: #A8D8EA;
      --p6: #C4B5F4;
      --p7: #F4B5D4;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
      background: linear-gradient(160deg, #FFB3BA 0%, #FFCBA4 18%, #FFF3A3 35%,
          #B5EAD7 50%, #A8D8EA 65%, #C4B5F4 82%, #F4B5D4 100%);
      background-attachment: fixed;
      user-select: none;
      -webkit-user-select: none;
    }

    /* TOP */
    .topbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      height: 52px;
    }

    .back-btn {
      padding: 6px 14px;
      border-radius: 999px;
      border: 2px solid var(--sea);
      background: #fff;
      color: var(--sea);
      font-family: 'Fredoka One', cursive;
      font-size: 0.9rem;
      text-decoration: none;
    }

    .title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      flex: 1;
      text-align: center;
    }

    .tool-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 2px solid var(--dark);
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      cursor: pointer;
      flex-shrink: 0;
    }

    .tool-btn.active {
      background: var(--p3);
    }

    /* CARD ROW */
    .card-row {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px;
      height: 54px;
    }

    .secret-card {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      border: 2px solid var(--dark);
      box-shadow: 2px 2px 0 var(--dark);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      flex-shrink: 0;
    }

    .card-back {
      position: absolute;
      inset: 0;
      background: var(--p6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      transition: opacity 0.1s;
    }

    .card-front {
      position: absolute;
      inset: 0;
      background: var(--p3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      opacity: 0;
      transition: opacity 0.1s;
    }

    .secret-card.peeking .card-back {
      opacity: 0;
    }

    .secret-card.peeking .card-front {
      opacity: 1;
    }

    .peek-hint {
      font-size: 0.68rem;
      font-weight: 800;
      color: var(--deep);
      line-height: 1.3;
    }

    .cards-left {
      margin-left: auto;
      font-size: 0.7rem;
      font-weight: 800;
      color: var(--deep);
    }

    /* COLOR ROW */
    .color-row {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border: 4px solid var(--p7);
      border-radius: 25px;
      height: 44px;
      overflow-x: auto;
    }

    .color-row::-webkit-scrollbar {
      display: none;
    }

    .color-dot {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 3px solid transparent;
      flex-shrink: 0;
      cursor: pointer;
    }

    .color-dot.active {
      border-color: var(--p3);
      transform: scale(1.2);
    }

    .size-slider {
      height: 5px;
      background: #ccc;
      border-radius: 3px;
      flex: 1;
      min-width: 40px;
      max-width: 90px;
      cursor: pointer;
      outline: none;
    }

    .size-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--dark);
      cursor: pointer;
    }

    /* CANVAS — takes remaining space */
    canvas {
      flex: 1;
      display: block;
      cursor: crosshair;
      background: #fff;
      /* IMPORTANT: no position, no z-index, just plain block */
    }

    /* BOTTOM */
    .btn-row {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      height: 58px;
    }

    .bottom-btn {
      flex: 1;
      padding: 10px 6px;
      border-radius: 14px;
      border: 3px solid var(--dark);
      font-family: 'Fredoka One', cursive;
      font-size: 0.88rem;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--dark);
    }

    .bottom-btn:active {
      transform: scale(0.95);
    }

    .btn-clear {
      background: #fff;
      color: var(--coral);
      border-color: var(--coral);
      box-shadow: 3px 3px 0 var(--coral);
    }

    .btn-done {
      background: var(--sun);
    }

    .btn-new {
      background: var(--p4);
      color: var(--dark);
      border-color: var(--dark);
      box-shadow: 3px 3px 0 var(--dark);
    }

    /* OVERLAYS */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .overlay.show {
      display: flex;
    }

    .modal {
      background: var(--p5);
      border-radius: 22px;
      border: 4px solid var(--dark);
      padding: 24px 20px;
      max-width: 320px;
      width: 90%;
      text-align: center;
      box-shadow: 5px 5px 0 var(--dark);
    }

    .modal h2 {
      font-family: 'Fredoka One', cursive;
      font-size: 1.4rem;
      margin-bottom: 6px;
    }

    .modal p {
      font-size: 0.85rem;
      color: var(--sea);
      font-weight: 700;
      margin-bottom: 16px;
    }

    .card-stack {
      position: relative;
      width: 110px;
      height: 110px;
      margin: 0 auto 18px;
    }

    .stack-card {
      position: absolute;
      width: 95px;
      height: 95px;
      background: var(--p6);
      border-radius: 14px;
      border: 3px solid var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .stack-card:nth-child(1) {
      top: 14px;
      left: 14px;
      transform: rotate(-6deg);
      opacity: .4
    }

    .stack-card:nth-child(2) {
      top: 7px;
      left: 7px;
      transform: rotate(-2deg);
      opacity: .7
    }

    .stack-card:nth-child(3) {
      top: 0;
      left: 0;
      transform: rotate(2deg)
    }

    .mbtn {
      width: 100%;
      padding: 13px;
      border-radius: 14px;
      border: 3px solid var(--dark);
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      cursor: pointer;
      margin-bottom: 8px;
      box-shadow: 3px 3px 0 var(--dark);
    }

    .mbtn:active {
      transform: scale(0.95);
    }

    .mbtn:last-child {
      margin-bottom: 0;
    }

    .mbtn-pull {
      background: var(--sun);
    }

    .mbtn-go {
      background: var(--p4);
      color: var(--dark);
      border-color: var(--dark);
      box-shadow: 3px 3px 0 var(--dark);
    }

    .mbtn-cancel {
      background: #fff;
      color: var(--coral);
      border-color: var(--coral);
      box-shadow: 3px 3px 0 var(--coral);
    }

    .rev-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      z-index: 210;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
    }

    .rev-overlay.show {
      display: flex;
    }

    .big-card {
      background: var(--p3);
      border-radius: 26px;
      border: 5px solid var(--dark);
      padding: 30px 26px;
      text-align: center;
      box-shadow: 5px 5px 0 var(--dark);
    }

    .big-emoji {
      font-size: 6.5rem;
      line-height: 1;
      display: block;
      animation: bob 1.4s ease-in-out infinite;
    }

    @keyframes bob {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-8px)
      }
    }

    .big-card p {
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      margin-top: 8px;
    }

    .mbtn-wide {
      max-width: 260px;
      width: 90%;
      margin: 0 auto;
    }

    .done-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 220;
      align-items: center;
      justify-content: center;
    }

    .done-overlay.show {
      display: flex;
    }

    .done-modal {
      background: #fff;
      border-radius: 22px;
      border: 4px solid var(--dark);
      padding: 20px;
      text-align: center;
      max-width: 290px;
      width: 88%;
    }

    .done-modal h2 {
      font-family: 'Fredoka One', cursive;
      font-size: 1.4rem;
    }

    .done-was {
      font-size: 2.2rem;
      margin: 6px 0;
    }

    .score-chip {
      background: var(--p3);
      border-radius: 999px;
      padding: 5px 16px;
      font-family: 'Fredoka One', cursive;
      font-size: 0.9rem;
      border: 2px solid var(--dark);
      display: inline-block;
      margin-bottom: 12px;
    }

    .done-btns {
      display: flex;
      gap: 8px;
    }

    .done-btns .mbtn {
      margin: 0;
    }
  </style>
</head>

<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <a href="index.html" class="back-btn">← Hjem</a>
    <div class="title">🎨 Tegne-spil</div>
    <div style="display:flex;gap:6px">
      <div class="tool-btn active" id="pen-btn" onclick="setTool('pen')">✏️</div>
      <div class="tool-btn" id="eraser-btn" onclick="setTool('eraser')">🧹</div>
    </div>
  </div>

  <!-- CARD ROW -->
  <div class="card-row">
    <div class="secret-card" id="secret-card" onmousedown="startPeek()" onmouseup="stopPeek()" onmouseleave="stopPeek()"
      ontouchstart="startPeek(event)" ontouchend="stopPeek()">
      <div class="card-back">🂠</div>
      <div class="card-front" id="card-front"></div>
    </div>
    <div class="peek-hint">Hold nede<br>for at kigge 👆</div>
    <div class="cards-left" id="cards-left"></div>
  </div>

  <!-- COLORS -->
  <div class="color-row" id="color-row"></div>

  <!-- CANVAS -->
  <canvas id="c"></canvas>

  <!-- BOTTOM -->
  <div class="btn-row">
    <button class="bottom-btn btn-clear" onclick="clearCanvas()">🧹 Ryd</button>
    <button class="bottom-btn btn-done" onclick="openDone()">✅ Gættet!</button>
    <button class="bottom-btn btn-new" onclick="openDrawModal()">🃏 Nyt kort</button>
  </div>

  <!-- DRAW MODAL -->
  <div class="overlay" id="draw-ov">
    <div class="modal">
      <h2>Træk et kort!</h2>
      <p>Kun du må se hvad du trækker!</p>
      <div class="card-stack">
        <div class="stack-card">🂠</div>
        <div class="stack-card">🂠</div>
        <div class="stack-card">🂠</div>
      </div>
      <button class="mbtn mbtn-pull" onclick="pullCard()">🤫 Træk hemmeligt!</button>
      <button class="mbtn mbtn-cancel" onclick="closeOv('draw-ov')">✖ Luk</button>
    </div>
  </div>

  <!-- REVEALED -->
  <div class="rev-overlay" id="rev-ov">
    <div class="big-card">
      <span class="big-emoji" id="rev-emoji"></span>
    </div>
    <button class="mbtn mbtn-go mbtn-wide" onclick="startDrawing()">✏️ Tegn nu!</button>
  </div>

  <!-- DONE -->
  <div class="done-overlay" id="done-ov">
    <div class="done-modal">
      <h2>🎉 Gættet!</h2>
      <div class="done-was" id="done-emoji"></div>
      <div class="score-chip" id="done-score"></div>
      <div class="done-btns">
        <button class="mbtn" style="background:var(--sun)" onclick="nextRound()">➡️ Næste!</button>
        <button class="mbtn mbtn-cancel" onclick="restartGame()">🔄 Forfra</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let painting = false, mx = 0, my = 0;
    let tool = 'pen', color = '#1A2E4A', size = 6;

    function sizeCanvas() {
      // Use offsetWidth/offsetHeight — works because canvas is flex:1
      const w = canvas.offsetWidth;
      const h = canvas.offsetHeight;
      if (!w || !h) return;
      // Save content
      const tmp = document.createElement('canvas');
      tmp.width = canvas.width || w;
      tmp.height = canvas.height || h;
      if (canvas.width && canvas.height) {
        tmp.getContext('2d').drawImage(canvas, 0, 0);
      }
      canvas.width = w;
      canvas.height = h;
      ctx.drawImage(tmp, 0, 0);
    }

    function dot(x, y) {
      ctx.beginPath();
      ctx.arc(x, y, (tool === 'eraser' ? size * 3 : size) / 2, 0, Math.PI * 2);
      ctx.fillStyle = tool === 'eraser' ? '#fff' : color;
      ctx.fill();
    }

    function line(x, y) {
      ctx.beginPath();
      ctx.moveTo(mx, my);
      ctx.lineTo(x, y);
      ctx.strokeStyle = tool === 'eraser' ? '#fff' : color;
      ctx.lineWidth = tool === 'eraser' ? size * 3 : size;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();
      mx = x; my = y;
    }

    // Mouse
    canvas.addEventListener('mousedown', e => {
      painting = true;
      mx = e.offsetX; my = e.offsetY;
      dot(mx, my);
    });
    canvas.addEventListener('mousemove', e => {
      if (!painting) return;
      line(e.offsetX, e.offsetY);
    });
    canvas.addEventListener('mouseup', () => { painting = false; });
    canvas.addEventListener('mouseleave', () => { painting = false; });

    // Touch
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const r = canvas.getBoundingClientRect();
      const t = e.touches[0];
      mx = t.clientX - r.left;
      my = t.clientY - r.top;
      painting = true;
      dot(mx, my);
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (!painting) return;
      const r = canvas.getBoundingClientRect();
      const t = e.touches[0];
      line(t.clientX - r.left, t.clientY - r.top);
    }, { passive: false });

    canvas.addEventListener('touchend', e => { e.preventDefault(); painting = false; }, { passive: false });
    canvas.addEventListener('touchcancel', e => { e.preventDefault(); painting = false; }, { passive: false });

    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    function setTool(t) {
      tool = t;
      canvas.style.cursor = t === 'eraser' ? 'cell' : 'crosshair';
      document.getElementById('pen-btn').classList.toggle('active', t === 'pen');
      document.getElementById('eraser-btn').classList.toggle('active', t === 'eraser');
    }

    // Colors
    const COLORS = ['#1A2E4A', '#E53935', '#1E88E5', '#43A047', '#FDD835', '#FB8C00', '#8E24AA', '#F48FB1', '#00ACC1', '#ffffff', '#6D4C41', '#FF6B6B'];
    (function buildColors() {
      const row = document.getElementById('color-row');
      COLORS.forEach(c => {
        const d = document.createElement('div');
        d.className = 'color-dot' + (c === color ? ' active' : '');
        d.style.background = c;
        d.onclick = () => {
          color = c;
          document.querySelectorAll('.color-dot').forEach(x => x.classList.remove('active'));
          d.classList.add('active');
          setTool('pen');
        };
        row.appendChild(d);
      });
      const sl = document.createElement('input');
      sl.type = 'range'; sl.min = 2; sl.max = 30; sl.value = size; sl.className = 'size-slider';
      sl.oninput = () => { size = +sl.value; };
      row.appendChild(sl);
    })();

    // Cards
    const ALL_CARDS = [
      '🚢', '⛪', '🪨', '🌊', '🦅', '🚲', '🍦', '🐚', '⛵', '🌅', '🐟', '🏖️', '🌲', '🐄', '💨',
      '🐘', '🦁', '🐬', '🦒', '🐧', '🦊', '🐙', '🦋', '🐊', '🦓', '🐼', '🦅', '🐢', '🐸', '🦩',
      '🍕', '🍎', '🚗', '✈️', '🏠', '⭐', '🌈', '🎂', '👑', '🎸', '🌻', '🍉', '🎠', '🚀', '⚽',
      '🌸', '🍄', '🌙', '☀️', '❄️', '🌋', '🏔️', '🌴', '🌵', '🍀',
    ];
    let deck = [], currentCard = null, score = 0;
    function shuffleDeck() { deck = [...ALL_CARDS].sort(() => Math.random() - 0.5); }
    function updateLeft() {
      document.getElementById('cards-left').textContent = deck.length + ' kort';
    }
    function openDrawModal() {
      document.getElementById('draw-ov').classList.add('show');
      updateLeft();
    }
    function closeOv(id) { document.getElementById(id).classList.remove('show'); }
    function pullCard() {
      if (!deck.length) shuffleDeck();
      currentCard = deck.pop();
      closeOv('draw-ov');
      document.getElementById('rev-emoji').textContent = currentCard;
      document.getElementById('rev-ov').classList.add('show');
      updateLeft();
    }
    function startDrawing() {
      closeOv('rev-ov');
      document.getElementById('card-front').textContent = currentCard;
      clearCanvas();
    }
    function startPeek(e) {
      if (e) e.preventDefault();
      if (!currentCard) return;
      document.getElementById('secret-card').classList.add('peeking');
    }
    function stopPeek() {
      document.getElementById('secret-card').classList.remove('peeking');
    }
    function openDone() {
      if (!currentCard) { openDrawModal(); return; }
      score++;
      document.getElementById('done-emoji').textContent = currentCard;
      document.getElementById('done-score').textContent = '⭐ ' + score + ' point';
      document.getElementById('done-ov').classList.add('show');
    }
    function nextRound() { closeOv('done-ov'); clearCanvas(); openDrawModal(); }
    function restartGame() {
      closeOv('done-ov'); score = 0; currentCard = null;
      document.getElementById('card-front').textContent = '';
      clearCanvas(); shuffleDeck(); openDrawModal();
    }

    // Init
    shuffleDeck();
    window.addEventListener('resize', sizeCanvas);
    // Wait for flex layout to settle
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        sizeCanvas();
        openDrawModal();
      });
    });
  </script>
</body>

</html>
